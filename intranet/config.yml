backend:
  name: git-gateway
  branch: "base"

media_folder: "assets/netlify"
public_folder: "/assets/netlify/"

collections:
  - name: "pagine"
    label: "Pagine"
    folder: "it"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "page" }
      - { name: "title", label: "Titolo", widget: "string" }
      - { name: "date", label: "Data", widget: "datetime", default: "", hidden: true }
      - { name: "permalink", label: "Link personalizzato", widget: "string", required: true }
      - { name: "body", label: "page", widget: "markdown" }
  - name: "posts"
    label: "Post"
    label_singular: "Post"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "posts/{{slug}}"
    sortable_fields: ['date', 'title']
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "post" }
      - { label: "Titolo", name: "title", widget: "string" }
      - { label: "Data", name: "date", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ssZ" }
      - { label: "Categoria", name: "categories", widget: "list", default: ["notizie"] }
      - { label: "Tag", name: "tags", widget: "list" }
      - { label: "Immagine", name: "image", widget: "image", required: false }
      - { label: "Contenuto", name: "body", widget: "markdown" }
      - { label: "Autore", name: "autore", widget: "string", default: "Redazione: Gabriel Matteo Jones" }
  # Gestione skills
  - name: "skills"
    label: "Skills"
    editor:
      preview: false
    files:
      - file: "_data/skills.yml"
        label: "Competenze"
        name: "skills"
        fields:
          - label: "Lista competenze"
            name: "skills"
            widget: list
            fields:
              - { label: "Nome", name: "title", widget: string }
              - { label: "Livello", name: "level", widget: string }
              - { label: "Categoria", name: "category", widget: string }

  # Gestione timeline
  - name: "timeline"
    label: "Timeline"
    editor:
      preview: false
    files:
      - file: "_data/timeline.yml"
        label: "Percorso"
        name: "timeline"
        fields:
          - label: "Tappe"
            name: "stages"
            widget: list
            fields:
              - { label: "Anno", name: "year", widget: string }
              - { label: "Titolo", name: "title", widget: string }
              - { label: "Descrizione", name: "description", widget: text }

  # Gestione progetti (già definita prima, ma qui compatta)
  - name: "projects"
    label: "Progetti"
    editor:
      preview: false
    files:
      - file: "_data/projects.yml"
        label: "Progetti"
        name: "projects"
        fields:
          - label: "Lista progetti"
            name: "projects"
            widget: list
            fields:
              - { label: "Titolo", name: "title", widget: string }
              - { label: "Descrizione", name: "description", widget: text }
              - { label: "Immagine", name: "image", widget: string }
              - { label: "In evidenza", name: "featured", widget: boolean, default: false }
              - label: "Link"
                name: "links"
                widget: list
                fields:
                  - { label: "Etichetta", name: "label", widget: string }
                  - { label: "URL", name: "url", widget: string }
              - { label: "Tag", name: "tags", widget: list }
