<!doctype html>
<html lang="it" class="scroll-smooth">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Jonez  Site</title>
    <meta name="description" content="Portfolio + Blog tutto-in-uno per un* 17enne curioso/a di tech e design" />
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] },
            boxShadow: { soft: '0 10px 30px rgba(0,0,0,0.08)' }
          }
        }
      }
  
    </script>
    <!-- Chart.js per grafico competenze -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <link rel="preconnect" href="https://images.unsplash.com" />
    <style>
      /* animazioni leggere */
      .fade-in { animation: fade-in .6s ease both; }
      @keyframes fade-in { from { opacity:0; transform: translateY(6px);} to{opacity:1; transform: none;} }
    </style>
  </head>
  <body class="bg-zinc-50 text-zinc-900 dark:bg-zinc-950 dark:text-zinc-100">
    <!-- HEADER -->
    <header class="sticky top-0 z-50 bg-white/70 backdrop-blur border-b border-zinc-200 dark:bg-zinc-900/70 dark:border-zinc-800">
      <div class="mx-auto max-w-6xl px-4 py-3 flex items-center justify-between">
        <a href="/#home" class="flex items-center gap-2">
          <img src="https://gabrieljones.it/assets/logo.png" alt="Logo" class="inline-flex h-9 w-9 rounded-2xl" />
          <span class="font-semibold" id="brandName">Jonez Site</span>
        </a>
        <nav class="hidden md:flex items-center gap-1 text-sm">
          <a href="/#home" class="px-3 py-2 rounded-xl hover:bg-zinc-100 dark:hover:bg-zinc-800">Home</a>
          <a href="https://{{ site.global }}/jonez/aree-tematiche/" class="px-3 py-2 rounded-xl hover:bg-zinc-100 dark:hover:bg-zinc-800">Sezioni</a>
          <a href="/#projects" class="px-3 py-2 rounded-xl hover:bg-zinc-100 dark:hover:bg-zinc-800">Progetti</a>
          <a href="/#blog" class="px-3 py-2 rounded-xl hover:bg-zinc-100 dark:hover:bg-zinc-800">Blog</a>
          <a href="/#skills" class="px-3 py-2 rounded-xl hover:bg-zinc-100 dark:hover:bg-zinc-800">Competenze</a>
          <a href="/#timeline" class="px-3 py-2 rounded-xl hover:bg-zinc-100 dark:hover:bg-zinc-800">Percorso</a>
          <a href="/#contact" class="px-3 py-2 rounded-xl hover:bg-zinc-100 dark:hover:bg-zinc-800">Contatti</a>
          <a href="https://{{ site.global }}/" class="px-3 py-2 rounded-xl hover:bg-zinc-100 dark:hover:bg-zinc-800"><b>Global Jonez</b></a>
        </nav>
        <div class="flex items-center gap-2">
          <button id="themeToggle" class="p-2 rounded-xl border border-zinc-200 hover:bg-zinc-100 dark:border-zinc-700 dark:hover:bg-zinc-800" aria-label="Tema">🌗</button>
          <button id="menuBtn" class="md:hidden p-2 rounded-xl border border-zinc-200 hover:bg-zinc-100 dark:border-zinc-700 dark:hover:bg-zinc-800" aria-label="Menu">☰</button>
        </div>
      </div>
      <!-- mobile sheet -->
      <div id="mobileMenu" class="hidden md:hidden border-t border-zinc-200 dark:border-zinc-800">
        <div class="mx-auto max-w-6xl px-4 py-2 grid gap-1">
          <a class="px-3 py-2 rounded-xl hover:bg-zinc-100 dark:hover:bg-zinc-800" href="#home">Home</a>
          <a class="px-3 py-2 rounded-xl hover:bg-zinc-100 dark:hover:bg-zinc-800" href="#projects">Progetti</a>
          <a class="px-3 py-2 rounded-xl hover:bg-zinc-100 dark:hover:bg-zinc-800" href="#blog">Blog</a>
          <a class="px-3 py-2 rounded-xl hover:bg-zinc-100 dark:hover:bg-zinc-800" href="#skills">Competenze</a>
          <a class="px-3 py-2 rounded-xl hover:bg-zinc-100 dark:hover:bg-zinc-800" href="#timeline">Percorso</a>
          <a class="px-3 py-2 rounded-xl hover:bg-zinc-100 dark:hover:bg-zinc-800" href="#contact">Contatti</a>
        </div>
      </div>
    </header>

    <main class="mx-auto max-w-6xl px-4">
    {{ content }}
    </main>

    <!-- FOOTER -->
    <footer class="mt-14 border-t border-zinc-200 py-10 dark:border-zinc-800">
      <div class="mx-auto max-w-6xl px-4 flex flex-col sm:flex-row items-center justify-between gap-4">
        <p class="text-sm text-zinc-600 dark:text-zinc-400">© <span id="year"></span> <span id="footerName">Jonez Site - By Gabriel Jones</span>. Fatto con ❤️ e curiosità.</p>
        <div class="flex items-center gap-3 text-sm">
          <a href="#home" class="underline underline-offset-4">Torna su</a>
          <span class="inline-flex items-center gap-2 rounded-xl border border-zinc-200 px-3 py-1 text-xs text-zinc-600 dark:text-zinc-400 dark:border-zinc-700">☀️ Light | 🌙 Dark</span>
        </div>
      </div>
    </footer>

    <script>
      // ====== CONFIG RAPIDA: modifica qui per personalizzare ======
      const PROFILE = {
        name: 'Gabriel Jones',
        email: 'gabriel.jones@18f.it',
        location: 'Italia',
        socials: {
          github: 'https://github.com/gabrielmatteojones',
          linkedin: 'https://linkedin.com/in/gabrielmatteojones',
          instagram: 'https://instagram.com/gabrielmatteojones_official'
        },
        cvUrl: '#'
      };

      // ====== Dark mode persistente ======
      const root = document.documentElement;
      const userPref = localStorage.getItem('theme');
      if (userPref === 'dark' || (!userPref && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        root.classList.add('dark');
      }
      document.getElementById('themeToggle').addEventListener('click', () => {
        root.classList.toggle('dark');
        localStorage.setItem('theme', root.classList.contains('dark') ? 'dark' : 'light');
      });

      // ====== Mobile menu ======
      const menuBtn = document.getElementById('menuBtn');
      const mobileMenu = document.getElementById('mobileMenu');
      menuBtn.addEventListener('click', () => mobileMenu.classList.toggle('hidden'));

      // ====== Popola nome/footer + CV ======
      document.getElementById('brandName').textContent = PROFILE.name;
      document.getElementById('footerName').textContent = PROFILE.name;
      document.getElementById('year').textContent = new Date().getFullYear();
      document.querySelectorAll('a[href="#"]').forEach(a => { if (a.textContent.includes('CV')) a.href = PROFILE.cvUrl; });
      // Social links
      document.querySelectorAll('a[aria-label="GitHub"], a[href*="github.com/username"]').forEach(a=>a.href=PROFILE.socials.github);
      document.querySelectorAll('a[aria-label="LinkedIn"], a[href*="linkedin.com/in/username"]').forEach(a=>a.href=PROFILE.socials.linkedin);
      document.querySelectorAll('a[aria-label="Instagram"], a[href*="instagram.com/username"]').forEach(a=>a.href=PROFILE.socials.instagram);
      document.querySelectorAll('form[action^="mailto:"]').forEach(f=>f.action=`mailto:${PROFILE.email}`);
      document.querySelectorAll('a[href^="mailto:"]').forEach(a=>a.href=`mailto:${PROFILE.email}`);

      // ====== Ricerca progetti ======
      const input = document.getElementById('searchInput');
      const cards = Array.from(document.querySelectorAll('.project'));
      input.addEventListener('input', () => {
        const q = input.value.toLowerCase();
        cards.forEach(c => {
          const title = c.getAttribute('data-title').toLowerCase();
          const tags = c.getAttribute('data-tags').toLowerCase();
          c.style.display = (title.includes(q) || tags.includes(q)) ? '' : 'none';
        });
      });

      // ====== Blog dialog ======
      const posts = {
        p1: { title: 'Perché ho iniziato a programmare a 17 anni', html: `<p>La mia storia in breve: curiosità, errori e prime vittorie. Qui puoi scrivere l\'articolo completo, anche in <strong>Markdown</strong> convertito in HTML.</p>` },
        p2: { title: '5 tool gratis che uso ogni giorno', html: `<ul><li>VS Code</li><li>Notion</li><li>Figma</li><li>Raycast/Alfred</li><li>Obsidian</li></ul>` },
        p3: { title: 'Imparare React senza annoiarsi', html: `<p>Mini-progetti, esercizi pratici e clonazioni leggere: il modo migliore per fissare i concetti.</p>` }
      };
      const dialog = document.getElementById('postDialog');
      const postTitle = document.getElementById('postTitle');
      const postContent = document.getElementById('postContent');
      document.querySelectorAll('[data-post]').forEach(btn => {
        btn.addEventListener('click', () => {
          const p = posts[btn.dataset.post];
          postTitle.textContent = p.title;
          postContent.innerHTML = p.html + postContent.innerHTML.match(/<pre[\s\S]*/)[0];
          dialog.showModal();
        });
      });
      document.getElementById('closeDialog').addEventListener('click', () => dialog.close());

      // ====== Chart.js Radar per competenze ======
      const ctx = document.getElementById('skillsChart');
      const data = {
        labels: ['HTML/CSS','JavaScript','React','Python','UI/UX'],
        datasets: [{ label: 'Livello', data: [100,90,80,75,80], fill: true }]
      };
      new Chart(ctx, { type: 'radar', data, options: { scales: { r: { suggestedMin: 0, suggestedMax: 100 } }, plugins: { legend: { display: false } } } });
    </script>
  </body>
</html>
