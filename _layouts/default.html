<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nome Cognome — Giovane politico ed educatore</title>
  <meta name="description" content="Sito ufficiale di Nome Cognome, 17enne attivo/a in politica ed educazione: idee, progetti, eventi e contatti." />
  <meta name="theme-color" content="#0e7c86" />
  <link rel="icon" href="/favicon.ico" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg: #0b0f14;
      --paper: #0f1620;
      --text: #e8f1f2;
      --muted:#b6c5c7;
      --brand:#0e7c86;
      --brand-2:#2ad1d1;
      --accent:#ffd166;
      --ok:#06d6a0;
      --shadow: 0 14px 40px rgba(0,0,0,.25);
      --radius: 18px;
    }
    :root.light{
      --bg: #f7fafc;
      --paper: #ffffff;
      --text: #0b1220;
      --muted:#53616b;
      --brand:#0e7c86;
      --brand-2:#16b3b3;
      --accent:#ffb703;
      --ok:#149f7f;
      --shadow: 0 10px 30px rgba(0,0,0,.08);
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0; font-family:Inter, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, "Helvetica Neue", Arial, sans-serif;
      color:var(--text);
      background: radial-gradient(1200px 600px at 80% -20%, color-mix(in oklab, var(--brand-2) 20%, transparent), transparent),
                  radial-gradient(800px 400px at -10% 10%, color-mix(in oklab, var(--brand) 30%, transparent), transparent),
                  var(--bg);
    }
    a{color:var(--brand-2); text-decoration:none}
    a:hover{text-decoration:underline}

    .skip-link{position:absolute; left:-9999px; top:auto; width:1px; height:1px; overflow:hidden}
    .skip-link:focus{position:fixed; left:12px; top:12px; width:auto; height:auto; background:var(--paper); padding:10px 12px; border-radius:10px; box-shadow:var(--shadow)}

    .container{max-width:1140px; margin:0 auto; padding:0 20px}
    header{position:sticky; top:0; backdrop-filter:saturate(180%) blur(12px); background:color-mix(in oklab, var(--bg) 85%, transparent); border-bottom:1px solid rgba(255,255,255,.06); z-index:50}
    .nav{display:flex; align-items:center; gap:28px; height:68px}
    .brand{display:flex; gap:12px; align-items:center}
    .logo{width:40px; height:40px; border-radius:12px; background:conic-gradient(from 30deg,var(--brand), var(--brand-2), var(--brand)); box-shadow:var(--shadow)}
    .brand h1{font-size:18px; margin:0}

    nav ul{
      display:flex;
      align-items:center;   /* centra i link verticalmente */
      gap:12px;
      list-style:none;
      margin:0;
      padding:0;
      height:100%;
    }
    nav li{
      display:flex;
      align-items:center;
    }
    nav a,
    nav button{
      display:flex;
      align-items:center;
      padding:10px 12px;
      border-radius:12px;
      background:none;
      border:none;
      color:inherit;
      cursor:pointer;
      font:inherit;
    }
    nav a[aria-current="true"],
    nav a:hover,
    nav button:hover{
      background:rgba(255,255,255,.08);
    }
    .menu-btn{display:none; background:none; border:1px solid rgba(255,255,255,.2); color:var(--text); padding:8px 12px; border-radius:12px}

    /* --- resto CSS invariato --- */
    .hero{padding:84px 0 40px}
    .hero-grid{display:grid; grid-template-columns:1.2fr .8fr; gap:32px; align-items:center}
    .badge{display:inline-flex; align-items:center; gap:8px; padding:6px 10px; border:1px solid rgba(255,255,255,.2); border-radius:999px; color:var(--muted); font-size:14px}
    .badge .dot{width:8px; height:8px; border-radius:50%; background:var(--ok)}
    .hero h2{font-size:48px; line-height:1.08; margin:14px 0}
    .hero p{color:var(--muted); font-size:18px}
    .cta{display:flex; gap:12px; margin-top:20px; flex-wrap:wrap}
    .btn{display:inline-flex; align-items:center; gap:10px; padding:12px 16px; border-radius:14px; border:1px solid rgba(255,255,255,.2); background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02)); color:var(--text); cursor:pointer}
    .btn.primary{background:linear-gradient(135deg,var(--brand),var(--brand-2)); border-color:transparent; color:#071418; font-weight:800}
    .btn.ghost{background:transparent}
    .card{background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03)); border:1px solid rgba(255,255,255,.08); border-radius:var(--radius); box-shadow:var(--shadow)}
    .photo{aspect-ratio:1; border-radius:var(--radius); background:#0a1418 url('images/ritratto.jpg') center/cover no-repeat; border:1px solid rgba(255,255,255,.08)}

    section{padding:64px 0}
    .section-title{font-size:30px; margin:0 0 6px}
    .section-sub{margin:0 0 24px; color:var(--muted)}

    .grid{display:grid; gap:18px}
    .grid-4{grid-template-columns:repeat(4,1fr)}
    .grid-3{grid-template-columns:repeat(3,1fr)}
    .grid-2{grid-template-columns:repeat(2,1fr)}
    .item{padding:18px}
    .item h3{margin:6px 0 8px}
    .pill{display:inline-block; font-size:12px; padding:6px 10px; border-radius:999px; border:1px solid rgba(255,255,255,.18); color:var(--muted)}

    .stats{display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-top:16px}
    .stat{padding:14px 16px; border-radius:14px; border:1px solid rgba(255,255,255,.1); text-align:center}
    .stat b{font-size:22px; display:block}

    .timeline{position:relative; padding-left:16px}
    .timeline:before{content:""; position:absolute; left:6px; top:8px; bottom:8px; width:2px; background:linear-gradient(var(--brand), transparent)}
    .step{position:relative; margin:14px 0; padding-left:18px}
    .step:before{content:""; position:absolute; left:-2px; top:6px; width:10px; height:10px; border-radius:50%; background:var(--brand-2); box-shadow:0 0 0 3px rgba(42,209,209,.15)}

    details.faq{border:1px solid rgba(255,255,255,.12); border-radius:14px; padding:12px 14px}
    details.faq + details.faq{margin-top:12px}
    details.faq summary{cursor:pointer; font-weight:600}

    footer{padding:40px 0 80px; border-top:1px solid rgba(255,255,255,.08); color:var(--muted)}

    form{display:grid; gap:12px}
    label{font-size:14px; color:var(--muted)}
    input, textarea{width:100%; padding:12px 14px; border-radius:12px; border:1px solid rgba(255,255,255,.18); background:rgba(255,255,255,.03); color:var(--text)}
    textarea{min-height:120px}
    .form-row{display:grid; gap:12px; grid-template-columns:1fr 1fr}

    .notice{font-size:12px; color:var(--muted)}

    @media (max-width: 1024px){
      .hero-grid{grid-template-columns:1fr}
      .grid-4{grid-template-columns:repeat(2,1fr)}
      .stats{grid-template-columns:repeat(2,1fr)}
    }
    @media (max-width: 640px){
      nav ul{display:none}
      .menu-btn{display:inline-block}
      .grid-3,.grid-2,.grid-4{grid-template-columns:1fr}
      .hero h2{font-size:38px}
    }
    @media (prefers-reduced-motion: reduce){
      *{animation:none!important; transition:none!important}
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#contenuto">Salta al contenuto</a>
  <header aria-label="Barra di navigazione">
    <div class="container nav" role="navigation">
      <div class="brand">
        <div class="logo" aria-hidden="true"></div>
        <h1 aria-label="Nome Cognome">Nome Cognome</h1>
      </div>
      <button class="menu-btn" aria-controls="menu" aria-expanded="false" onclick="toggleMenu()" aria-label="Apri menu">Menu</button>
      <nav>
        <ul id="menu" aria-label="Sezioni del sito">
          <li><a href="#chi-sono">Chi sono</a></li>
          <li><a href="#idee">Idee</a></li>
          <li><a href="#progetti">Progetti</a></li>
          <li><a href="#sostieni">Sostieni</a></li>
          <li><a href="#eventi">Eventi</a></li>
          <li><a href="#media">Media</a></li>
          <li><a href="#contatti" class="pill">Contatti</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- resto del contenuto invariato (hero, sezioni, footer, script ecc.) -->
</body>
</html>
