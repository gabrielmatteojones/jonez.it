<!doctype html>
<html lang="it" class="scroll-smooth">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Jonez Site - dipartimento per l'infanzia</title>
    <meta name="description" content="Portfolio + Blog tutto-in-uno per un* 17enne curioso/a di tech e design" />
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] },
            boxShadow: { soft: '0 10px 30px rgba(0,0,0,0.08)' }
          }
        }
      }
  
    </script>
    <!-- Chart.js per grafico competenze -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <link rel="preconnect" href="https://images.unsplash.com" />
    <style>
      /* animazioni leggere */
      .fade-in { animation: fade-in .6s ease both; }
      @keyframes fade-in { from { opacity:0; transform: translateY(6px);} to{opacity:1; transform: none;} }
    </style>
  </head>
  <body class="bg-zinc-50 text-zinc-900 dark:bg-zinc-950 dark:text-zinc-100">
    <main class="mx-auto max-w-6xl px-4">
    {{ content }}
    </main>

    <script>
      // ====== CONFIG RAPIDA: modifica qui per personalizzare ======
      const PROFILE = {
        name: 'Gabriel Jones',
        email: 'gabriel.jones@18f.it',
        location: 'Italia',
        socials: {
          github: 'https://github.com/gabrielmatteojones',
          linkedin: 'https://linkedin.com/in/gabrielmatteojones',
          instagram: 'https://instagram.com/gabrielmatteojones_official'
        },
        cvUrl: '#'
      };

      // ====== Dark mode persistente ======
      const root = document.documentElement;
      const userPref = localStorage.getItem('theme');
      if (userPref === 'dark' || (!userPref && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        root.classList.add('dark');
      }
      document.getElementById('themeToggle').addEventListener('click', () => {
        root.classList.toggle('dark');
        localStorage.setItem('theme', root.classList.contains('dark') ? 'dark' : 'light');
      });

      // ====== Mobile menu ======
      const menuBtn = document.getElementById('menuBtn');
      const mobileMenu = document.getElementById('mobileMenu');
      menuBtn.addEventListener('click', () => mobileMenu.classList.toggle('hidden'));

      // ====== Popola nome/footer + CV ======
      document.getElementById('brandName').textContent = PROFILE.name;
      document.getElementById('footerName').textContent = PROFILE.name;
      document.getElementById('year').textContent = new Date().getFullYear();
      document.querySelectorAll('a[href="#"]').forEach(a => { if (a.textContent.includes('CV')) a.href = PROFILE.cvUrl; });
      // Social links
      document.querySelectorAll('a[aria-label="GitHub"], a[href*="github.com/username"]').forEach(a=>a.href=PROFILE.socials.github);
      document.querySelectorAll('a[aria-label="LinkedIn"], a[href*="linkedin.com/in/username"]').forEach(a=>a.href=PROFILE.socials.linkedin);
      document.querySelectorAll('a[aria-label="Instagram"], a[href*="instagram.com/username"]').forEach(a=>a.href=PROFILE.socials.instagram);
      document.querySelectorAll('form[action^="mailto:"]').forEach(f=>f.action=`mailto:${PROFILE.email}`);
      document.querySelectorAll('a[href^="mailto:"]').forEach(a=>a.href=`mailto:${PROFILE.email}`);

      // ====== Ricerca progetti ======
      const input = document.getElementById('searchInput');
      const cards = Array.from(document.querySelectorAll('.project'));
      input.addEventListener('input', () => {
        const q = input.value.toLowerCase();
        cards.forEach(c => {
          const title = c.getAttribute('data-title').toLowerCase();
          const tags = c.getAttribute('data-tags').toLowerCase();
          c.style.display = (title.includes(q) || tags.includes(q)) ? '' : 'none';
        });
      });

      // ====== Blog dialog ======
      const posts = {
        p1: { title: 'Perché ho iniziato a programmare a 17 anni', html: `<p>La mia storia in breve: curiosità, errori e prime vittorie. Qui puoi scrivere l\'articolo completo, anche in <strong>Markdown</strong> convertito in HTML.</p>` },
        p2: { title: '5 tool gratis che uso ogni giorno', html: `<ul><li>VS Code</li><li>Notion</li><li>Figma</li><li>Raycast/Alfred</li><li>Obsidian</li></ul>` },
        p3: { title: 'Imparare React senza annoiarsi', html: `<p>Mini-progetti, esercizi pratici e clonazioni leggere: il modo migliore per fissare i concetti.</p>` }
      };
      const dialog = document.getElementById('postDialog');
      const postTitle = document.getElementById('postTitle');
      const postContent = document.getElementById('postContent');
      document.querySelectorAll('[data-post]').forEach(btn => {
        btn.addEventListener('click', () => {
          const p = posts[btn.dataset.post];
          postTitle.textContent = p.title;
          postContent.innerHTML = p.html + postContent.innerHTML.match(/<pre[\s\S]*/)[0];
          dialog.showModal();
        });
      });
      document.getElementById('closeDialog').addEventListener('click', () => dialog.close());

      // ====== Chart.js Radar per competenze ======
      const ctx = document.getElementById('skillsChart');
      const data = {
        labels: ['HTML/CSS','JavaScript','React','Python','UI/UX'],
        datasets: [{ label: 'Livello', data: [100,90,80,75,80], fill: true }]
      };
      new Chart(ctx, { type: 'radar', data, options: { scales: { r: { suggestedMin: 0, suggestedMax: 100 } }, plugins: { legend: { display: false } } } });
    </script>
  </body>
</html>
